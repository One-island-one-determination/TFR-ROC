 LOADING_TIP_95: "大陸目前的社會危機唯一的化解之道就是和平民主轉型，而這個任務只有三民主義力量才能完成。\n ——陳榮利"
 LOADING_TIP_96: "人民看不下去就該下台。\n ——徐巧芯"
