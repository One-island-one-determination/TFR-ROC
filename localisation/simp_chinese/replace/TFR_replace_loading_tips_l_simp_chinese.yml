 LOADING_TIP_85: "得民心者得天下，得民調者得痔瘡\n ——韓國瑜"
 LOADING_TIP_86: "所以我是台灣市長嗎\n ——蔣萬安"
 LOADING_TIP_87: "我們要舉辦無限城論壇\n ——沈伯陽"
 LOADING_TIP_88: "台北花了170億的世大運，本來應該從從容容遊刃有餘，現在是匆匆忙忙連滾帶爬！\n ——王世堅"
 LOADING_TIP_89: "假使朝鮮人要想掙脫日帝國主義的枷鍊，我們對他們的獨立鬬爭自然將加以熱烈的援助。對於臺灣也是如此。\n ——毛澤東"
 LOADING_TIP_90: "中華民國絕不承認兩個中國\n ——蔣經國"
