l_simp_chinese:
 LOADING_TIP_0: "我認為台灣失去的會非常少，唯一失去的就是台獨的自由。\n ——黃志賢"
 LOADING_TIP_1: "現在台​​灣就一個殖民地，別為台灣民眾考慮太多，揍一頓就都能想通。\n ——沈逸"
 LOADING_TIP_2: "一個戰爭販子，一個民族敗類，你們為什麼要保護他\n ——張安樂"
 LOADING_TIP_3: "中共希望台灣的政治與社會愈混亂，民心愈浮動，對他愈有利。要達成這種有利情勢，就必須要有一個反對的力量，而現成的反對力量就是美麗島這批人士。\n ——汪敬煦《汪敬煦先生訪談錄》（1993年）"
 LOADING_TIP_4: "中國歷史沒有拋棄台灣，台灣也不能拋棄中國大陸。\n ——李登輝"
 LOADING_TIP_5: "我就是中華民國最強外掛！\n ——郭台銘"
 LOADING_TIP_6: "民進黨不等於台灣，國民黨也不等於中華民國。\n ——蔡英文2015年競選總統期間發言"
 LOADING_TIP_7: "說實在的，中共的專制政權也根本不配使用民主「中華民國」的名號。中共的這個「改名錯誤」，或許給我們這一代中國大陸人留下了一個契機──將「中華民國」重新喚回中國大陸和整個中國。\n ——王炳章《重建中華民國》（2000年）"
 LOADING_TIP_8: "我講一句最粗的台語：你們都是中國人『幹』出來的！……你們不配做中國人，雖然你們是中國人生出來的，生出來的孽種，我們不要你們，中國人不要你們！\n ——2014年4月1日，中華統一促進黨總裁「白狼」張安樂"
 LOADING_TIP_9: "中華民國、中華民國台灣、台灣都是我們的名字，都是我們國家的名字，都一樣響亮。\n ——賴清德"
 LOADING_TIP_10: "民進黨需要一場君子之爭，也希望蔡總統「要求她的網軍停止攻擊我」，這些攻擊對未來團結沒有幫助。\n ——賴清德"
 LOADING_TIP_11: "不是表決多數贏就可以，不是哦，不是這樣喔！\n ——賴清德"
 LOADING_TIP_12: "好像每一家的老公身體都不好\n ——賴清德"
 LOADING_TIP_13: "我們要一起聯起手來，對付國民黨這個統治者，對付國民黨這個殘暴不義的政權！\n ——1988年台灣建國演講鄭麗文"
 LOADING_TIP_14: "我喜歡餐後來一點冰淇淋，我也喜歡香菜，但是香菜加冰淇淋，我不確定這是一個擁有社會共識的吃法⋯⋯\n ——蔡英文"
 LOADING_TIP_15: "我們已經是一個獨立的國家，我們叫自己中華民國\n ——蔡英文"
 LOADING_TIP_16: "若台灣有需要時，我們都是辣台派，該辣就辣。\n ——蔡英文"
 LOADING_TIP_17: "這不必跟我說，去跟老闆說嘛…你們要自立自強啊。\n ——蔡英文"
 LOADING_TIP_18: "你可以哭泣，但不要洩氣；你可以悲傷，但不要放棄。\n ——蔡英文"
 LOADING_TIP_19: "謙卑、謙卑、再謙卑。\n ——蔡英文"
 LOADING_TIP_20: "台灣是一個主權獨立的國家，名字叫中華民國，與中華人民共和國互不隸屬。\n ——賴清德"
 LOADING_TIP_21: "我是務實的台獨工作者。\n ——賴清德"
 LOADING_TIP_22: "中華人民共和國無權代表台灣。\n ——賴清德"
 LOADING_TIP_23: "中國是境外敵對勢力。\n ——賴清德"
 LOADING_TIP_24: "高雄又老又窮，各行各業蕭條的不得了。\n ——韓國瑜"
 LOADING_TIP_25: "可憐啊！ \n ——韓國瑜"
 LOADING_TIP_26: "大陸民眾認為，如果台灣做得到的話，大陸為甚麼做不到？這些都是讓我們感到很欣慰的，因為如果有一天，大陸也能夠民主化，我覺得兩岸之間所存在的許多問題，一定更好解決\n ——馬英九"
 LOADING_TIP_27: "中華民國就是台灣，台灣就是中華民國，現在的中華民國政府不再是外來政府。\n ——蔡英文"
 LOADING_TIP_28: "這個社會破了很多洞，我會用盡全力來把他們都補起來。\n ——蔡英文"
 LOADING_TIP_29: "我身後的總統府，離廣場上的人民，只有幾百公尺的距離，不過，總統府裡面的人，就是聽不到人民的聲音。\n ——蔡英文"
 LOADING_TIP_30: "馬英九憑什麼沒收我的牛，馬英九還我牛\n ——柯賜海"
 LOADING_TIP_31: "時代在變，環境在變，潮流也在變。\n ——蔣經國"
 LOADING_TIP_32: "如果人民不歡迎我們，就該我們下台了。\n ——胡耀邦"
 LOADING_TIP_33: "我不希望台灣變成大陸，那我以後台灣也來不了了\n ——王志安"
 LOADING_TIP_34: "中華民國代表中國，中華人民共和國叫中華北京\n ——王志安"
 LOADING_TIP_35: "文革之後無儒學，真正之儒學在港臺\n ——蔣慶"
 LOADING_TIP_36: "中國的出路是民主和科學。\n ——胡耀邦"
 LOADING_TIP_37: "「戰爭早就已經開始了」\n ——《零日攻擊》"
 LOADING_TIP_38: "鄉親長輩們，聖戰已經開始了！\n ——柯建銘"
