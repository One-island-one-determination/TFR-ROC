 LOADING_TIP_99: "台北不是我的家，我的家乡没有霓虹灯，繁荣的都市，过渡的小镇，徘徊在文明里的人们。\n ——罗大佑《鹿港小镇》"
 LOADING_TIP_100: "人可以不同政黨，但是一定要站在同一國家立場 \n ——賴清德"
